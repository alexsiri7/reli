name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Setup
        run: ./scripts/gates.sh setup

      - name: Lint
        run: ./scripts/gates.sh lint

      - name: Typecheck
        run: ./scripts/gates.sh typecheck

      - name: Test
        run: ./scripts/gates.sh test

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [gates]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/alexsiri7/reli:${{ github.sha }}
            ghcr.io/alexsiri7/reli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: read
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: 100.120.193.82
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: GITHUB_SHA,GHCR_TOKEN,GHCR_USER
          script: |
            IMAGE="ghcr.io/alexsiri7/reli"
            NEW_TAG="${GITHUB_SHA}"
            VERSIONS_FILE="/home/asiri/gt/reli/mayor/rig/data/deploy-versions.txt"

            # Authenticate with GHCR using workflow token
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Record current running version before deploying
            CURRENT_TAG=$(grep -m1 '' "$VERSIONS_FILE" 2>/dev/null || true)
            echo "Previous version: ${CURRENT_TAG:-none}"

            # Pull the new image
            docker pull "$IMAGE:$NEW_TAG"

            # Update and restart
            cd /home/asiri/gt/reli/mayor/rig
            git pull --rebase
            RELI_IMAGE_TAG="$NEW_TAG" docker compose up -d

            # Verify the container is healthy by hitting the live endpoint
            echo "Waiting for health check..."
            HEALTHY=false
            for i in 1 2 3 4 5; do
              sleep 3
              if curl -sf --max-time 5 http://localhost:8000/healthz | grep -q '"status":"ok"'; then
                HEALTHY=true
                break
              fi
              echo "Health check attempt $i failed, retrying..."
            done

            if [ "$HEALTHY" = true ]; then
              echo "Deploy successful: $NEW_TAG (health check passed)"
              # Prepend new version to history and keep last 3
              { echo "$NEW_TAG"; head -2 "$VERSIONS_FILE" 2>/dev/null; } > "${VERSIONS_FILE}.tmp"
              mv "${VERSIONS_FILE}.tmp" "$VERSIONS_FILE"
              echo "Version history:"
              cat "$VERSIONS_FILE"
            else
              echo "Deploy FAILED — health check did not pass after 5 attempts"
              if [ -n "$CURRENT_TAG" ]; then
                echo "Rolling back to previous version: $CURRENT_TAG"
                docker pull "$IMAGE:$CURRENT_TAG"
                RELI_IMAGE_TAG="$CURRENT_TAG" docker compose up -d
                sleep 5
                if curl -sf --max-time 5 http://localhost:8000/healthz | grep -q '"status":"ok"'; then
                  echo "Rollback successful — $CURRENT_TAG is healthy"
                else
                  echo "WARNING: Rollback version also failed health check"
                fi
              else
                echo "No previous version to roll back to"
              fi
              exit 1
            fi

  cleanup:
    name: Clean up old container images
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: write
    steps:
      - name: Delete old image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: reli
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
