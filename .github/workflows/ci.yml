name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # pip 25.1+ ships resolvelib 1.1.0 which hits ResolutionTooDeep on the
      # backend's AI/observability graph (litellm, google-adk, arize-phoenix,
      # opentelemetry-*, mcp, supabase, strawberry-graphql). Pin to the last
      # pre-regression release until upstream fixes the resolver. See #920.
      - name: Pin pip < 25.1 (resolvelib regression workaround)
        run: python -m pip install --upgrade "pip<25.1"

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Setup
        run: ./scripts/gates.sh setup

      - name: Lint & Typecheck
        run: ./scripts/gates.sh lint & ./scripts/gates.sh typecheck & wait

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # See lint-and-typecheck job for rationale.
      - name: Pin pip < 25.1 (resolvelib regression workaround)
        run: python -m pip install --upgrade "pip<25.1"

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Setup
        run: ./scripts/gates.sh setup

      - name: Test
        run: ./scripts/gates.sh test

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/alexsiri7/reli:${{ github.sha }}
            ghcr.io/alexsiri7/reli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy moved to staging-pipeline.yml — CI success triggers staging deploy,
  # then production deploy (with rollback) after staging health check passes.
