name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: ruff check backend/ && ruff format --check backend/

      - name: Run tests
        run: pytest backend/

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm run test

  # Build and push Docker image to GHCR after tests pass.
  # The image is tagged with the commit SHA and :latest.
  # Required: repo must have packages write permission (default for GITHUB_TOKEN).
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/alexsiri7/reli:${{ github.sha }}
            ghcr.io/alexsiri7/reli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy by pulling the new image on the server.
  # Tags the current running image as :rollback before switching.
  # Required GitHub Actions secrets:
  #   TAILSCALE_AUTHKEY   - Tailscale auth key for VPN access
  #   SSH_DEPLOY_KEY      - private SSH key authorized on the server
  #   DEPLOY_USER         - SSH username on the server
  #   GHCR_PAT            - Personal access token with read:packages scope (for server docker pull)
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: 100.120.193.82
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: GITHUB_SHA,GHCR_PAT
          script: |
            IMAGE="ghcr.io/alexsiri7/reli"
            NEW_TAG="${GITHUB_SHA}"

            # Authenticate with GHCR to pull images
            echo "$GHCR_PAT" | docker login ghcr.io -u alexsiri7 --password-stdin

            # Tag current running image as :rollback before deploying
            CURRENT_ID=$(docker inspect --format='{{.Image}}' reli-reli-1 2>/dev/null || true)
            if [ -n "$CURRENT_ID" ]; then
              docker tag "$CURRENT_ID" "$IMAGE:rollback"
            fi

            # Pull the new image
            docker pull "$IMAGE:$NEW_TAG"

            # Update and restart
            cd /home/asiri/gt/reli/mayor/rig
            git pull --rebase
            RELI_IMAGE_TAG="$NEW_TAG" docker compose up -d

            # Verify the container started
            sleep 3
            if docker inspect --format='{{.State.Running}}' reli-reli-1 2>/dev/null | grep -q true; then
              echo "Deploy successful: $NEW_TAG"
            else
              echo "Deploy FAILED — rolling back to previous image"
              RELI_IMAGE_TAG=rollback docker compose up -d
              exit 1
            fi
