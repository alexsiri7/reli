name: CI

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Setup
        run: ./scripts/gates.sh setup

      - name: Lint & Typecheck
        run: ./scripts/gates.sh lint & ./scripts/gates.sh typecheck & wait

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Setup
        run: ./scripts/gates.sh setup

      - name: Test
        run: ./scripts/gates.sh test

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/alexsiri7/reli:${{ github.sha }}
            ghcr.io/alexsiri7/reli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (staging)
        if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/alexsiri7/reli:staging-${{ github.sha }}
            ghcr.io/alexsiri7/reli:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    permissions:
      packages: read
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy staging via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: 100.120.193.82
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: GITHUB_SHA,GHCR_TOKEN,GHCR_USER
          script: |
            IMAGE="ghcr.io/alexsiri7/reli"
            NEW_TAG="staging-${GITHUB_SHA}"

            # Authenticate with GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull the staging image
            docker pull "$IMAGE:$NEW_TAG"

            # Deploy with staging compose override
            cd /mnt/ext-fast/gc/rigs/reli
            git pull --rebase
            RELI_IMAGE_TAG="$NEW_TAG" RELI_ENVIRONMENT=staging \
              docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

            # Verify health
            echo "Waiting for staging health check..."
            HEALTHY=false
            for i in 1 2 3 4 5; do
              sleep 3
              RESPONSE=$(curl -sf --max-time 5 http://localhost:8001/healthz 2>/dev/null || true)
              if echo "$RESPONSE" | grep -q '"status":"ok"'; then
                if echo "$RESPONSE" | grep -q '"environment":"staging"'; then
                  HEALTHY=true
                  break
                fi
              fi
              echo "Health check attempt $i failed, retrying..."
            done

            if [ "$HEALTHY" = true ]; then
              echo "Staging deploy successful: $NEW_TAG"
            else
              echo "Staging deploy FAILED — health check did not pass"
              RELI_IMAGE_TAG="$NEW_TAG" RELI_ENVIRONMENT=staging \
                docker compose -f docker-compose.yml -f docker-compose.staging.yml down
              exit 1
            fi

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: read
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: 100.120.193.82
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: GITHUB_SHA,GHCR_TOKEN,GHCR_USER
          script: |
            IMAGE="ghcr.io/alexsiri7/reli"
            NEW_TAG="${GITHUB_SHA}"

            # Authenticate with GHCR using workflow token
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Tag current running image as :rollback before deploying
            CURRENT_ID=$(docker inspect --format='{{.Image}}' reli-reli-1 2>/dev/null || true)
            if [ -n "$CURRENT_ID" ]; then
              docker tag "$CURRENT_ID" "$IMAGE:rollback"
            fi

            # Pull the new image
            docker pull "$IMAGE:$NEW_TAG"

            # Update and restart
            cd /mnt/ext-fast/gc/rigs/reli
            git pull --rebase
            RELI_IMAGE_TAG="$NEW_TAG" docker compose up -d

            # Verify the container is healthy by hitting the live endpoint
            echo "Waiting for health check..."
            HEALTHY=false
            for i in 1 2 3 4 5; do
              sleep 3
              if curl -sf --max-time 5 http://localhost:8000/healthz | grep -q '"status":"ok"'; then
                HEALTHY=true
                break
              fi
              echo "Health check attempt $i failed, retrying..."
            done

            if [ "$HEALTHY" = true ]; then
              echo "Deploy successful: $NEW_TAG (health check passed)"
            else
              echo "Deploy FAILED — health check did not pass after 5 attempts"
              echo "Rolling back to previous image..."
              RELI_IMAGE_TAG=rollback docker compose up -d
              sleep 5
              if curl -sf --max-time 5 http://localhost:8000/healthz | grep -q '"status":"ok"'; then
                echo "Rollback successful — previous version is healthy"
              else
                echo "WARNING: Rollback version also failed health check"
              fi
              exit 1
            fi
