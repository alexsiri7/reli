name: Staging → Production Pipeline

# Required secrets:
#   RAILWAY_TOKEN          — Railway project API token (Settings → Tokens)
#   RAILWAY_STAGING_URL    — Full URL of the Railway staging service (e.g. https://reli-staging.up.railway.app)
#   RAILWAY_PRODUCTION_URL — Full URL of the Railway production service (e.g. https://reli.up.railway.app)
#
# Required Railway project setup:
#   - One project with two environments: staging and production
#   - Service named "reli" in both environments

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service reli \
            --environment staging \
            --detach

      - name: Wait for staging health
        run: |
          echo "Polling ${{ secrets.RAILWAY_STAGING_URL }}/healthz ..."
          for i in $(seq 1 20); do
            if curl -sf --max-time 5 "${{ secrets.RAILWAY_STAGING_URL }}/healthz" | grep -q '"status":"ok"'; then
              echo "Staging healthy after attempt $i"
              exit 0
            fi
            echo "Attempt $i/20 failed, waiting 30s..."
            sleep 30
          done
          echo "Staging failed to become healthy after 20 attempts"
          exit 1

  staging-e2e:
    name: Staging E2E smoke tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Run smoke tests against staging
        env:
          BASE_URL: ${{ secrets.RAILWAY_STAGING_URL }}
        run: npm --prefix frontend run test:smoke

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [deploy-staging, staging-e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service reli \
            --environment production \
            --detach

      - name: Wait for production health
        run: |
          echo "Polling ${{ secrets.RAILWAY_PRODUCTION_URL }}/healthz ..."
          for i in $(seq 1 20); do
            if curl -sf --max-time 5 "${{ secrets.RAILWAY_PRODUCTION_URL }}/healthz" | grep -q '"status":"ok"'; then
              echo "Production healthy after attempt $i"
              exit 0
            fi
            echo "Attempt $i/20 failed, waiting 30s..."
            sleep 30
          done
          echo "Production failed to become healthy after 20 attempts"
          exit 1
