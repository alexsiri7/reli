[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
addopts = "--cov=backend --cov-report=term --cov-report=html"

[tool.coverage.report]
fail_under = 70

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = "backend.tests.*"
disallow_untyped_defs = false
warn_return_any = false
disable_error_code = ["type-var", "misc"]
